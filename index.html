<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BioSentinel Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=7" />
  </head>
  <body>
    <main class="page">
      <header class="brandbar">
        <h1>BIOSENTINEL</h1>
        <p class="subtitle">KAN / promoter insertion profile across yeast chromosomes</p>
        <p class="metadata">Sample: SRR26617638 · Bin: 1 kb · Reference: S. cerevisiae S288C · Date: 2026-06-06</p>
      </header>

      <section class="viewer" aria-label="Vue génomique">
        <div class="figure-wrap">
          <img
            class="genome-svg"
            src="./output/combined_kan_vcf_chrom_histograms_bin1000.svg?v=4"
            alt="Histogrammes fusionnés Kan_gene et Promotor_VCF par chromosome"
          />
          <button class="chr-hit chr-hit-iv" id="openChrIV" type="button" aria-label="Ouvrir le détail du chromosome IV"></button>
        </div>
      </section>
    </main>

    <div class="modal" id="modal" aria-hidden="true">
      <div class="modal-backdrop" id="closeBackdrop"></div>
      <section class="dialog" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <header class="dialog-head">
          <div>
            <p class="eyebrow">chrIV</p>
            <h2 id="modalTitle">Histogramme local</h2>
            <div class="gene-replaced" id="geneReplaced" aria-live="polite"></div>
          </div>
          <div class="mod-center" id="modCenter">Centre modification: -</div>
          <button class="close" id="closeModal" type="button" aria-label="Fermer">×</button>
        </header>

        <div class="control-row is-hidden">
          <label for="binSlider">Fenêtre</label>
          <input id="binSlider" type="range" min="500" max="20000" step="100" value="500" />
          <output id="binValue" for="binSlider">500 bp</output>
        </div>

        <div class="control-row is-hidden">
          <label for="viewSlider">Région</label>
          <input id="viewSlider" type="range" min="50000" max="350000" step="10000" value="200000" />
          <output id="viewValue" for="viewSlider">200,000 bp</output>
        </div>

        <div class="plot-panel">
          <div id="chrIVPlot"></div>
        </div>
      </section>
    </div>

    <script src="insertions-data.js?v=1"></script>
    <script src="app.js?v=19"></script>
  </body>
</html>
